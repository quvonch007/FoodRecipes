{% extends 'base.html' %}
{% load socialaccount %}

{% block title %}Kirish{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow p-4" style="width: 400px;">
        
        <h4 class="text-center mb-4 fw-bold">🍽 FoodRecipes</h4>

        <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger w-100 mb-3">
            🔴 Google orqali kirish
        </a>

        <div class="text-center text-muted mb-3">— yoki —</div>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <!-- action yo'q, name="username" — sizning auth.py bilan ishlaydi -->
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Parol" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Kirish</button>
        </form>

        <div class="text-center mt-3">
            <small>Hisob yo'qmi? <a href="/register/">Ro'yxatdan o'tish</a></small>
        </div>

    </div>
</div>
{% endblock %}
